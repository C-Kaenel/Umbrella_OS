set default=0
set timeout=5

menuentry "Umbrella OS" {
    linux /boot/bzImage root=/dev/ram0 rw init=/init console=ttyS0,115200 console=tty0 nomodeset
    initrd /boot/initrd.img
}

menuentry "Umbrella OS (Minimal)" {
    linux /boot/bzImage root=/dev/ram0 rw init=/init console=tty0 nomodeset noapic nolapic
    initrd /boot/initrd.img
}
