set default=0
set timeout=5

menuentry "Umbrella OS (Universal)" {
    linux /boot/bzImage root=/dev/ram0 rw init=/init console=ttyS0,115200 console=tty0 nomodeset
    initrd /boot/initrd.img
}

menuentry "Umbrella OS (PC/Laptop)" {
    linux /boot/bzImage root=/dev/ram0 rw init=/init console=tty0 nomodeset
    initrd /boot/initrd.img
}

menuentry "Umbrella OS (QEMU)" {
    linux /boot/bzImage root=/dev/ram0 rw init=/init console=ttyS0,115200 nomodeset
    initrd /boot/initrd.img
}
